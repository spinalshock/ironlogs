<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ironlogs/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1b1b1d" />
    <title>IronLogs — Strength Tracker</title>
    <meta property="og:title" content="IronLogs — Strength Tracker" />
    <meta property="og:description" content="Track your lifts, score your strength, own your data." />
    <meta property="og:image" content="https://spinalshock.github.io/ironlogs/og-image.png" />
    <meta property="og:url" content="https://spinalshock.github.io/ironlogs" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      // SPA redirect restore for GitHub Pages
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
